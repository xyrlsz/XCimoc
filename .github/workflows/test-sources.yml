# =============================================================================
# XCimoc 漫画源测试 — GitHub Actions Workflow
#
# 功能:
#   - 直接复用漫画 Java 源代码，测试完整解析流程
#   - 自动将测试报告部署到 GitHub Pages
# =============================================================================

name: 漫画源测试

on:
  schedule:
    - cron: '0 2 * * *'

  workflow_dispatch:
    inputs:
      source_types:
        description: '要测试的源 TYPE（逗号分隔，留空测试所有）'
        required: false
        type: string
      verbose:
        description: '详细输出模式'
        required: false
        type: boolean
        default: false

  push:
    paths:
      - '.github/workflows/test-sources.yml'
      - 'docs/**'
      - 'sourcetester/**'
      - 'app/src/main/java/com/xyrlsz/xcimocob/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    name: Java 源码解析测试
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 缓存 Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: 编译 Java 测试模块
        run: |
          chmod +x gradlew
          ./gradlew :sourcetester:compileJava

      - name: 运行测试并生成报告
        id: run
        run: |
          ./gradlew :sourcetester:run --args="--output-dir ${{ github.workspace }}/reports" || true
          # 同步 HTML 报告到 docs/ 供 GitHub Pages 使用
          if [ -f "${{ github.workspace }}/reports/report.html" ]; then
            cp "${{ github.workspace }}/reports/report.html" docs/report.html
            echo "报告已同步到 docs/"
          fi
          echo "status=completed" >> $GITHUB_OUTPUT

      - name: 上传报告（GitHub Pages）
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/

  deploy:
    name: 部署到 GitHub Pages
    needs: test
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
