name: Android CI (tag)

on:
  push:
    tags: ["v*"]
    # branches: ["main"]

jobs:
  build-and-github-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "zulu"
          cache: gradle

      - name: Get Git commit hash
        id: git_commit_hash
        run: echo "GIT_COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Get Repository Info
        run: |
          REPO_NAME=$(echo $GITHUB_REPOSITORY | cut -d'/' -f2)
          REPO_OWNER=$(echo $GITHUB_REPOSITORY | cut -d'/' -f1)
          echo "GIT_REPO_NAME=$REPO_NAME" >> $GITHUB_ENV
          echo "GIT_REPO_OWNER=$REPO_OWNER" >> $GITHUB_ENV

      - name: Set up Go environment
        uses: actions/setup-go@v6
        with:
          go-version: ">=1.25"
          cache-dependency-path: data_server/go.sum

      - name: Build Data Sync Server (cross-platform)
        run: |
          cd data_server
          mkdir -p dist
          # Linux amd64
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/xcimoc-data-server-linux-amd64 .
          # Linux 386
          GOOS=linux GOARCH=386 go build -ldflags="-s -w" -o dist/xcimoc-data-server-linux-386 .
          # Linux arm64
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/xcimoc-data-server-linux-arm64 .
          # Linux arm (32-bit, ARMv7)
          GOOS=linux GOARCH=arm GOARM=7 go build -ldflags="-s -w" -o dist/xcimoc-data-server-linux-arm .
          # Windows amd64
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/xcimoc-data-server-windows-amd64.exe .
          # Windows 386
          GOOS=windows GOARCH=386 go build -ldflags="-s -w" -o dist/xcimoc-data-server-windows-386.exe .
          # macOS amd64
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/xcimoc-data-server-darwin-amd64 .
          # macOS arm64 (Apple Silicon)
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/xcimoc-data-server-darwin-arm64 .
          # Copy config example
          cp config.example.yaml dist/
          ls -lh dist/
          cd ..

      - name: Upload Data Sync Server as artifact
        uses: actions/upload-artifact@v6
        with:
          name: data-server-binaries
          path: data_server/dist/

      - name: Create keystore file from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/xcimoc.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_ENABLED: ${{ secrets.SIGNING_ENABLED }}
        run: ./gradlew assembleRelease

      - name: Upload APK as artifact (for Gitee job)
        uses: actions/upload-artifact@v6
        with:
          name: app-universal-release
          path: app/build/outputs/apk/release/app-universal-release.apk

      - name: Create GitHub Release and Upload APKs
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Release ${{ github.ref_name }}
          prerelease: false
          body_path: CHANGELOG.md
          files: |
            app/build/outputs/apk/release/app-arm64-v8a-release.apk 
            app/build/outputs/apk/release/app-armeabi-v7a-release.apk  
            app/build/outputs/apk/release/app-universal-release.apk
            app/build/outputs/apk/release/app-x86_64-release.apk
            app/build/outputs/apk/release/app-x86-release.apk
            data_server/dist/xcimoc-data-server-linux-amd64
            data_server/dist/xcimoc-data-server-linux-386
            data_server/dist/xcimoc-data-server-linux-arm64
            data_server/dist/xcimoc-data-server-linux-arm
            data_server/dist/xcimoc-data-server-windows-amd64.exe
            data_server/dist/xcimoc-data-server-windows-386.exe
            data_server/dist/xcimoc-data-server-darwin-amd64
            data_server/dist/xcimoc-data-server-darwin-arm64
            data_server/dist/config.example.yaml

  gitee-sync-and-release:
    runs-on: ubuntu-latest
    needs: build-and-github-release
    if: startsWith(github.ref, 'refs/tags/v')   # 仅在 tag 推送时执行

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get Git commit hash
        run: echo "GIT_COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Get Repository Info
        run: |
          REPO_NAME=$(echo $GITHUB_REPOSITORY | cut -d'/' -f2)
          REPO_OWNER=$(echo $GITHUB_REPOSITORY | cut -d'/' -f1)
          echo "GIT_REPO_NAME=$REPO_NAME" >> $GITHUB_ENV
          echo "GIT_REPO_OWNER=$REPO_OWNER" >> $GITHUB_ENV

      - name: Download APK artifact from build job
        uses: actions/download-artifact@v8
        with:
          name: app-universal-release
          path: app/build/outputs/apk/release/

      - name: Sync Github Repos To Gitee
        uses: Yikun/hub-mirror-action@master
        with:
          src: github/${{env.GIT_REPO_OWNER}}
          dst: gitee/${{env.GIT_REPO_OWNER}}
          dst_key: ${{ secrets.GITEE_PRIVATE_KEY }}
          dst_token: ${{ secrets.GITEE_TOKEN }}
          account_type: user
          clone_style: "https"
          debug: true
          force_update: true
          static_list: "${{env.GIT_REPO_NAME}}"
          timeout: "600s"

      - name: Create Gitee release
        id: create_gitee_release
        run: |
          RELEASE_ID=$(curl -X POST \
            --header 'Content-Type: application/json;charset=UTF-8' \
            "https://gitee.com/api/v5/repos/${{ env.GIT_REPO_OWNER }}/${{ env.GIT_REPO_NAME }}/releases" \
            -d '{
              "access_token":"${{ secrets.GITEE_TOKEN }}",
              "tag_name":"${{ github.ref_name }}",
              "name":"Release ${{ github.ref_name }}",
              "body":"${{ github.ref_name }}. Built from commit ${{ env.GIT_COMMIT_HASH }}. \n https://github.com/${{ env.GIT_REPO_OWNER }}/${{ env.GIT_REPO_NAME }}/releases/tag/${{ github.ref_name }}",
              "target_commitish":"main"
            }' | jq '.id')
          echo "GITEE_RELEASE_ID=$RELEASE_ID" >> $GITHUB_ENV
          echo "Release ID: $RELEASE_ID"

      - name: Upload APK to Gitee
        run: |
          curl -X POST "https://gitee.com/api/v5/repos/${{ env.GIT_REPO_OWNER }}/${{ env.GIT_REPO_NAME }}/releases/${{ env.GITEE_RELEASE_ID }}/attach_files" \
            -H "Authorization: Bearer ${{ secrets.GITEE_TOKEN }}" \
            -F "file=@app/build/outputs/apk/release/app-universal-release.apk"